name: Canary GitHub Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  canary:
    name: Build canary artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: adopt

      - name: Detect canary metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_VERSION=$(grep -E 'project\.version\s*=\s*"[^"]+"' build-logic/src/main/kotlin/publishing.gradle.kts | head -n1 | sed -E 's/.*project\.version\s*=\s*"([^"]+)".*/\1/')
          KOTLIN_VERSION=$(grep -E '^kotlin\s*=' libs.versions.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          INTELLIJ_PLATFORM_GRADLE_VERSION=$(grep -E '^intellijPlatform\s*=' libs.versions.toml | head -n1 | sed -E 's/.*"([^"]+)".*/\1/')
          BASE_VERSION="${PROJECT_VERSION%-SNAPSHOT}"
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          CANARY_VERSION="${BASE_VERSION}-canary.${GITHUB_RUN_NUMBER}.${SHORT_SHA}"
          TAG="canary-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"

          echo "project_version=$PROJECT_VERSION" >> "$GITHUB_OUTPUT"
          echo "kotlin_version=$KOTLIN_VERSION" >> "$GITHUB_OUTPUT"
          echo "intellij_platform_gradle_version=$INTELLIJ_PLATFORM_GRADLE_VERSION" >> "$GITHUB_OUTPUT"
          echo "idea_target_version=2026.2" >> "$GITHUB_OUTPUT"
          echo "canary_version=$CANARY_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Apply canary version to build metadata
        shell: bash
        run: |
          set -euo pipefail
          bash .github/scripts/bump-version.sh set "${{ steps.meta.outputs.canary_version }}"

      - name: Build JVM jars and IDEA plugin
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon clean assemble :kronos-idea-plugin:buildPlugin \
            -Pkronos.idea.plugin.version="${{ steps.meta.outputs.canary_version }}" \
            -Pkronos.idea.version="${{ steps.meta.outputs.idea_target_version }}" \
            -x test
          ./gradlew --no-daemon -p kronos-gradle-plugin clean assemble -x test

      - name: Collect release artifacts
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/canary
          find . -path '*/build/libs/*.jar' -type f \
            ! -path './kronos-docs/*' \
            -exec cp '{}' dist/canary/ ';'
          cp kronos-idea-plugin/build/distributions/*.zip dist/canary/
          (
            cd dist/canary
            sha256sum * > SHA256SUMS.txt
            ls -1 > ARTIFACTS.txt
          )
          echo "count=$(find dist/canary -type f | wc -l | tr -d ' ')" >> "$GITHUB_OUTPUT"

      - name: Write release notes
        shell: bash
        run: |
          set -euo pipefail
          cat > dist/canary/RELEASE_NOTES.md <<'NOTES'
          ## Kronos Canary Build

          This prerelease is produced automatically after a push to `main`.

          | Field | Value |
          | --- | --- |
          | Canary version | `${{ steps.meta.outputs.canary_version }}` |
          | Git tag | `${{ steps.meta.outputs.tag }}` |
          | Commit | `${{ steps.meta.outputs.commit_sha }}` |
          | Short commit | `${{ steps.meta.outputs.short_sha }}` |
          | Source event | `${{ github.event_name }}` |
          | Source branch | `${{ github.ref_name }}` |
          | Source project version | `${{ steps.meta.outputs.project_version }}` |
          | Canary Gradle project version | `${{ steps.meta.outputs.canary_version }}` |
          | IDEA plugin version | `${{ steps.meta.outputs.canary_version }}` |
          | Kotlin version | `${{ steps.meta.outputs.kotlin_version }}` |
          | IntelliJ IDEA target | `${{ steps.meta.outputs.idea_target_version }}` |
          | IntelliJ Platform Gradle Plugin | `${{ steps.meta.outputs.intellij_platform_gradle_version }}` |
          | GitHub run | `${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}` |

          Included artifacts:

          ```text
          NOTES
          cat dist/canary/ARTIFACTS.txt >> dist/canary/RELEASE_NOTES.md
          cat >> dist/canary/RELEASE_NOTES.md <<'NOTES'
          ```

          Checksums:

          ```text
          NOTES
          cat dist/canary/SHA256SUMS.txt >> dist/canary/RELEASE_NOTES.md
          cat >> dist/canary/RELEASE_NOTES.md <<'NOTES'
          ```

          `SHA256SUMS.txt` is also attached for checksum verification.
          NOTES

      - name: Publish GitHub canary release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${{ steps.meta.outputs.tag }}" dist/canary/* \
            --repo "${{ github.repository }}" \
            --title "Kronos Canary ${{ steps.meta.outputs.canary_version }}" \
            --notes-file dist/canary/RELEASE_NOTES.md \
            --prerelease \
            --latest=false
