name: Kronos Testing Coverage

on:
  push:
    branches: [ main ]
  merge_group:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  kronos-core-coverage:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 21 ☕️
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'adopt'

      - name: Export integration environment
        run: |
          source ./envsetup.sh
          {
            echo "MYSQL_USERNAME=${MYSQL_USERNAME}"
            echo "MYSQL_PASSWORD=${MYSQL_PASSWORD}"
            echo "MYSQL_DATABASE=${MYSQL_DATABASE}"
            echo "POSTGRES_USERNAME=${POSTGRES_USERNAME}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "POSTGRES_DATABASE=${POSTGRES_DATABASE}"
            echo "SQLSERVER_USERNAME=${SQLSERVER_USERNAME}"
            echo "SQLSERVER_PASSWORD=${SQLSERVER_PASSWORD}"
            echo "SQLSERVER_DATABASE=${SQLSERVER_DATABASE}"
            echo "SQLSERVER_JDBC_URL=${SQLSERVER_JDBC_URL}"
            echo "ORACLE_JDBC_URL=${ORACLE_JDBC_URL}"
            echo "ORACLE_USERNAME=${ORACLE_USERNAME}"
            echo "ORACLE_PASSWORD=${ORACLE_PASSWORD}"
            echo "ORACLE_SYS_PASSWORD=${ORACLE_SYS_PASSWORD}"
          } >> "$GITHUB_ENV"

      - name: Start integration databases
        run: docker compose -f kronos-testing/docker-compose.integration.yml up -d --wait

      - name: Prepare SQL Server database
        run: |
          docker exec kronos-testing-sqlserver bash -lc \
            "/opt/mssql-tools18/bin/sqlcmd -S localhost -U '${SQLSERVER_USERNAME}' -P '${SQLSERVER_PASSWORD}' -C -Q \"IF DB_ID('${SQLSERVER_DATABASE}') IS NULL CREATE DATABASE ${SQLSERVER_DATABASE}; SELECT DB_NAME(DB_ID('${SQLSERVER_DATABASE}'));\" || /opt/mssql-tools/bin/sqlcmd -S localhost -U '${SQLSERVER_USERNAME}' -P '${SQLSERVER_PASSWORD}' -Q \"IF DB_ID('${SQLSERVER_DATABASE}') IS NULL CREATE DATABASE ${SQLSERVER_DATABASE}; SELECT DB_NAME(DB_ID('${SQLSERVER_DATABASE}'));\""

      - name: Create badges dir if not exists 📁
        run: |
          mkdir -p coverage/kronos-core
          mkdir -p coverage/kronos-syntax
          mkdir -p coverage/kronos-compiler-plugin
          mkdir -p coverage/kronos-codegen

      - name: Run Core Test Coverage 🧪
        id: core-coverage
        run: |
          ./gradlew :kronos-core:koverLog
          ./gradlew :kronos-core:koverXmlReport
          ./gradlew :kronos-core:koverHtmlReport
          cat kronos-core/build/kover/coverage.txt
          cp -rf kronos-core/build/reports/kover/html/* coverage/kronos-core
          # 提取行覆盖率
          LINE_COVERAGE="$(cat kronos-core/build/kover/coverage.txt | grep 'application line coverage' | cut -d' ' -f4)"
          # 从XML报告提取分支覆盖率
          if [ -f "kronos-core/build/reports/kover/report.xml" ]; then
            BRANCH_DATA=$(grep -o 'BRANCH.*missed="[0-9]*".*covered="[0-9]*"' kronos-core/build/reports/kover/report.xml | tail -1)
            BRANCH_MISSED=$(echo "$BRANCH_DATA" | grep -o 'missed="[0-9]*"' | cut -d'"' -f2)
            BRANCH_COVERED=$(echo "$BRANCH_DATA" | grep -o 'covered="[0-9]*"' | cut -d'"' -f2)
            BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
            if [ $BRANCH_TOTAL -gt 0 ]; then
              BRANCH_COVERAGE=$(echo "scale=2; $BRANCH_COVERED * 100 / $BRANCH_TOTAL" | bc)
            else
              BRANCH_COVERAGE="0.00"
            fi
          else
            BRANCH_COVERAGE="N/A"
          fi
          echo "lines=${LINE_COVERAGE}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_COVERAGE}" >> $GITHUB_OUTPUT

      - name: Run Syntax Test Coverage 🧪
        id: syntax-coverage
        run: |
          ./gradlew :kronos-syntax:koverLog
          ./gradlew :kronos-syntax:koverXmlReport
          ./gradlew :kronos-syntax:koverHtmlReport
          ./gradlew :kronos-syntax:koverVerify
          cat kronos-syntax/build/kover/coverage.txt
          cp -rf kronos-syntax/build/reports/kover/html/* coverage/kronos-syntax
          # 提取行覆盖率
          LINE_COVERAGE="$(cat kronos-syntax/build/kover/coverage.txt | grep 'application line coverage' | cut -d' ' -f4)"
          # 从XML报告提取分支覆盖率
          if [ -f "kronos-syntax/build/reports/kover/report.xml" ]; then
            BRANCH_DATA=$(grep -o 'BRANCH.*missed="[0-9]*".*covered="[0-9]*"' kronos-syntax/build/reports/kover/report.xml | tail -1)
            BRANCH_MISSED=$(echo "$BRANCH_DATA" | grep -o 'missed="[0-9]*"' | cut -d'"' -f2)
            BRANCH_COVERED=$(echo "$BRANCH_DATA" | grep -o 'covered="[0-9]*"' | cut -d'"' -f2)
            BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
            if [ $BRANCH_TOTAL -gt 0 ]; then
              BRANCH_COVERAGE=$(echo "scale=2; $BRANCH_COVERED * 100 / $BRANCH_TOTAL" | bc)
            else
              BRANCH_COVERAGE="0.00"
            fi
          else
            BRANCH_COVERAGE="N/A"
          fi
          echo "lines=${LINE_COVERAGE}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_COVERAGE}" >> $GITHUB_OUTPUT

      - name: Run Compiler Plugin Test Coverage 🧪
        id: compiler-plugin-coverage
        run: |
          ./gradlew :kronos-compiler-plugin:koverLog
          ./gradlew :kronos-compiler-plugin:koverXmlReport
          ./gradlew :kronos-compiler-plugin:koverHtmlReport
          cat kronos-compiler-plugin/build/kover/coverage.txt
          cp -rf kronos-compiler-plugin/build/reports/kover/html/* coverage/kronos-compiler-plugin
          # 提取行覆盖率
          LINE_COVERAGE="$(cat kronos-compiler-plugin/build/kover/coverage.txt | grep 'application line coverage' | cut -d' ' -f4)"
          # 从XML报告提取分支覆盖率
          if [ -f "kronos-compiler-plugin/build/reports/kover/report.xml" ]; then
            BRANCH_DATA=$(grep -o 'BRANCH.*missed="[0-9]*".*covered="[0-9]*"' kronos-compiler-plugin/build/reports/kover/report.xml | tail -1)
            BRANCH_MISSED=$(echo "$BRANCH_DATA" | grep -o 'missed="[0-9]*"' | cut -d'"' -f2)
            BRANCH_COVERED=$(echo "$BRANCH_DATA" | grep -o 'covered="[0-9]*"' | cut -d'"' -f2)
            BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
            if [ $BRANCH_TOTAL -gt 0 ]; then
              BRANCH_COVERAGE=$(echo "scale=2; $BRANCH_COVERED * 100 / $BRANCH_TOTAL" | bc)
            else
              BRANCH_COVERAGE="0.00"
            fi
          else
            BRANCH_COVERAGE="N/A"
          fi
          echo "lines=${LINE_COVERAGE}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_COVERAGE}" >> $GITHUB_OUTPUT

      - name: Run Codegen Test Coverage 🧪
        id: codegen-coverage
        run: |
          ./gradlew :kronos-codegen:koverLog
          ./gradlew :kronos-codegen:koverXmlReport
          ./gradlew :kronos-codegen:koverHtmlReport
          cat kronos-codegen/build/kover/coverage.txt
          cp -rf kronos-codegen/build/reports/kover/html/* coverage/kronos-codegen
          # 提取行覆盖率
          LINE_COVERAGE="$(cat kronos-codegen/build/kover/coverage.txt | grep 'application line coverage' | cut -d' ' -f4)"
          # 从XML报告提取分支覆盖率
          if [ -f "kronos-codegen/build/reports/kover/report.xml" ]; then
            BRANCH_DATA=$(grep -o 'BRANCH.*missed="[0-9]*".*covered="[0-9]*"' kronos-codegen/build/reports/kover/report.xml | tail -1)
            BRANCH_MISSED=$(echo "$BRANCH_DATA" | grep -o 'missed="[0-9]*"' | cut -d'"' -f2)
            BRANCH_COVERED=$(echo "$BRANCH_DATA" | grep -o 'covered="[0-9]*"' | cut -d'"' -f2)
            BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))
            if [ $BRANCH_TOTAL -gt 0 ]; then
              BRANCH_COVERAGE=$(echo "scale=2; $BRANCH_COVERED * 100 / $BRANCH_TOTAL" | bc)
            else
              BRANCH_COVERAGE="0.00"
            fi
          else
            BRANCH_COVERAGE="N/A"
          fi
          echo "lines=${LINE_COVERAGE}" >> $GITHUB_OUTPUT
          echo "branch=${BRANCH_COVERAGE}" >> $GITHUB_OUTPUT

      - name: Stop integration databases
        if: always()
        run: docker compose -f kronos-testing/docker-compose.integration.yml down -v

      # ── PR 触发：将覆盖率结果评论到 PR ──────────────────────────────────────
      - name: Comment coverage on PR 💬
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const formatCoverage = (value) => {
              if (!value || value === 'N/A') return 'N/A';
              return value.trim().endsWith('%') ? value.trim() : `${value.trim()}%`;
            };

            const modules = [
              {
                name: 'kronos-syntax',
                lines: formatCoverage('${{ steps.syntax-coverage.outputs.lines }}'),
                branch: formatCoverage('${{ steps.syntax-coverage.outputs.branch }}'),
              },
              {
                name: 'kronos-codegen',
                lines: formatCoverage('${{ steps.codegen-coverage.outputs.lines }}'),
                branch: formatCoverage('${{ steps.codegen-coverage.outputs.branch }}'),
              },
              {
                name: 'kronos-core',
                lines: formatCoverage('${{ steps.core-coverage.outputs.lines }}'),
                branch: formatCoverage('${{ steps.core-coverage.outputs.branch }}'),
              },
              {
                name: 'kronos-compiler-plugin',
                lines: formatCoverage('${{ steps.compiler-plugin-coverage.outputs.lines }}'),
                branch: formatCoverage('${{ steps.compiler-plugin-coverage.outputs.branch }}'),
              },
            ];

            const body = [
              '## 📊 Test Coverage Report',
              '',
              '| Module | Line Coverage | Branch Coverage |',
              '|--------|:-------------:|:---------------:|',
              ...modules.map(({ name, lines, branch }) => `| \`${name}\` | ${lines} | ${branch} |`),
              '',
              `> Generated for commit \`${{ github.event.pull_request.head.sha }}\``,
            ].join('\n');

            // 找到之前由 Bot 发的同类评论并更新，避免重复刷评论
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📊 Test Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── push/merge_group 触发：生成 badge 并部署到 coverage 分支 ────────────
      - name: Generate the badge SVG image for Core
        if: github.event_name != 'pull_request'
        uses: emibcn/badge-action@v2.0.3
        with:
          label: 'core coverage'
          status: ${{ steps.core-coverage.outputs.lines }}
          color: 'blue,555,daf'
          path: 'coverage/coverage-core.svg'

      - name: Generate the badge SVG image for Syntax
        if: github.event_name != 'pull_request'
        uses: emibcn/badge-action@v2.0.3
        with:
          label: 'syntax coverage'
          status: ${{ steps.syntax-coverage.outputs.lines }}
          color: 'blue,555,daf'
          path: 'coverage/coverage-syntax.svg'

      - name: Generate the badge SVG image for Compiler Plugin
        if: github.event_name != 'pull_request'
        uses: emibcn/badge-action@v2.0.3
        with:
          label: 'compiler plugin coverage'
          status: ${{ steps.compiler-plugin-coverage.outputs.lines }}
          color: 'blue,555,daf'
          path: 'coverage/coverage-compiler-plugin.svg'

      - name: Generate the badge SVG image for Codegen
        if: github.event_name != 'pull_request'
        uses: emibcn/badge-action@v2.0.3
        with:
          label: 'codegen coverage'
          status: ${{ steps.codegen-coverage.outputs.lines }}
          color: 'blue,555,daf'
          path: 'coverage/coverage-codegen.svg'

      - name: Deploy to coverage branch 📦
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: coverage
          folder: coverage
          clean: true
          single-commit: true
