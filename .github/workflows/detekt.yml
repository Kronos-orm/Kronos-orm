name: detekt

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

jobs:
  detekt:
    name: Check Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref }}

      - name: detekt
        uses: alaegin/Detekt-Action@v1.23.8
        with:
          github_token: ${{ secrets.github_token }}
          detekt_config: detekt.yml
