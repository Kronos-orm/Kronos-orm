name: Publish Kronos

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Publish 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25 ☕️
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Detect version and mode 🔎
        id: detect
        run: |
          cur=$(grep -E 'project\.version\s*=\s*"[^"]+"' build-logic/src/main/kotlin/publishing.gradle.kts | head -n1 | sed -E 's/.*project\.version\s*=\s*"([^"]+)".*/\1/')
          echo "Current version: $cur"
          echo "current=$cur" >> "$GITHUB_OUTPUT"
          if echo "$cur" | grep -q -- "-SNAPSHOT$"; then
            echo "mode=snapshot" >> "$GITHUB_OUTPUT"
          else
            echo "mode=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git user 👤
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release ✨ - confirm version and commit
        if: steps.detect.outputs.mode == 'release'
        id: release_set
        run: |
          # Ensure version is a clean release (no -SNAPSHOT); if somehow a -SNAPSHOT is present, drop it.
          NEW_VERSION=$( bash .github/scripts/bump-version.sh release-from-current | tail -n1 | cut -d= -f2 )
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          # Commit only if files changed
          git add -A
          git diff --cached --quiet || git commit -m "chore(version): release $NEW_VERSION [skip ci]"

      - name: Release 🏷️ - tag and push version commit
        if: steps.detect.outputs.mode == 'release'
        run: |
          git push origin HEAD:${{ github.ref_name }}
          ver=${{ steps.release_set.outputs.version }}
          if [ -z "$ver" ]; then ver=${{ steps.detect.outputs.current }}; fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Release 🧱 - build JVM jars
        if: steps.detect.outputs.mode == 'release'
        run: |
          set -euo pipefail
          bash ./gradlew --no-daemon clean assemble \
            -x :kronos-idea-plugin:assemble \
            -x :kronos-idea-plugin:buildPlugin \
            -x :kronos-idea-plugin:instrumentCode \
            -x test
          bash ./gradlew --no-daemon -p kronos-gradle-plugin clean assemble -x test

      - name: Release 🧩 - publish IDEA plugin to Marketplace
        if: steps.detect.outputs.mode == 'release'
        env:
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          IDEA_CERTIFICATE_CHAIN: ${{ secrets.IDEA_CERTIFICATE_CHAIN }}
          IDEA_PRIVATE_KEY: ${{ secrets.IDEA_PRIVATE_KEY }}
          IDEA_PRIVATE_KEY_PASSWORD: ${{ secrets.IDEA_PRIVATE_KEY_PASSWORD }}
          RELEASE_VERSION: ${{ steps.release_set.outputs.version }}
        run: |
          set -euo pipefail
          for secret in PUBLISH_TOKEN IDEA_CERTIFICATE_CHAIN IDEA_PRIVATE_KEY IDEA_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!secret:-}" ]; then
              echo "Required IDEA Marketplace secret is missing: $secret" >&2
              exit 1
            fi
          done

          umask 077
          signing_dir="$RUNNER_TEMP/kronos-idea-plugin-signing"
          mkdir -p "$signing_dir"
          unset CERTIFICATE_CHAIN PRIVATE_KEY
          export CERTIFICATE_CHAIN_FILE="$signing_dir/chain.crt"
          export PRIVATE_KEY_FILE="$signing_dir/private.pem"
          export PRIVATE_KEY_PASSWORD="$IDEA_PRIVATE_KEY_PASSWORD"
          printf '%s' "$IDEA_CERTIFICATE_CHAIN" > "$CERTIFICATE_CHAIN_FILE"
          printf '%s' "$IDEA_PRIVATE_KEY" > "$PRIVATE_KEY_FILE"

          bash ./gradlew --no-daemon \
            :kronos-idea-plugin:signPlugin \
            :kronos-idea-plugin:verifyPluginStructure \
            :kronos-idea-plugin:verifyPluginSignature \
            -Pkronos.idea.version="2026.2" \
            -Pkronos.idea.java.compiler.version="262.8665.258" \
            -x test

          idea_plugin_zip="kronos-idea-plugin/build/distributions/kronos-idea-plugin-${RELEASE_VERSION}-signed.zip"
          python3 -m pip install --disable-pip-version-check "defusedxml==0.7.1"
          python3 .github/scripts/verify-idea-plugin-artifact.py \
            "$idea_plugin_zip" \
            --expected-version "$RELEASE_VERSION"

          bash ./gradlew --no-daemon :kronos-idea-plugin:publishPlugin \
            -Pkronos.idea.version="2026.2" \
            -Pkronos.idea.java.compiler.version="262.8665.258" \
            -x test

      - name: Release 🚀 - publish to Maven Central
        if: steps.detect.outputs.mode == 'release'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          bash ./gradlew --no-daemon publishAllToMavenCentral -x test

      - name: Release 📦 - collect GitHub release artifacts
        if: steps.detect.outputs.mode == 'release'
        env:
          RELEASE_VERSION: ${{ steps.release_set.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/release
          find . -path '*/build/libs/*.jar' -type f \
            ! -path './kronos-docs/*' \
            ! -path './dist/*' \
            -exec cp '{}' dist/release/ ';'
          idea_plugin_zip="kronos-idea-plugin/build/distributions/kronos-idea-plugin-${RELEASE_VERSION}-signed.zip"
          if [ ! -f "$idea_plugin_zip" ]; then
            echo "Signed IDEA plugin zip was not built: $idea_plugin_zip" >&2
            exit 1
          fi
          cp "$idea_plugin_zip" dist/release/
          (
            cd dist/release
            sha256sum * > SHA256SUMS.txt
            ls -1 > ARTIFACTS.txt
          )

      - name: Release 📝 - create GitHub release
        if: steps.detect.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release_set.outputs.version }}
        run: |
          set -euo pipefail
          git tag -f "v$RELEASE_VERSION"
          git push --force origin "v$RELEASE_VERSION"
          if gh release view "v$RELEASE_VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "v$RELEASE_VERSION" dist/release/* \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "v$RELEASE_VERSION" dist/release/* \
              --repo "${{ github.repository }}" \
              --title "Kronos $RELEASE_VERSION" \
              --generate-notes \
              --latest=true
          fi

      - name: Release 🔼 - open next SNAPSHOT PR
        if: steps.detect.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_VERSION="${{ steps.release_set.outputs.version }}"
          if [ -z "$RELEASE_VERSION" ]; then
            RELEASE_VERSION="${{ steps.detect.outputs.current }}"
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Cannot calculate next SNAPSHOT from release version: $RELEASE_VERSION" >&2
            exit 1
          fi

          NEXT_SNAPSHOT="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))-SNAPSHOT"
          BRANCH_NAME="chore/next-snapshot-${NEXT_SNAPSHOT%-SNAPSHOT}"

          EXISTING_PR_URL=$(gh pr list \
            --repo "${{ github.repository }}" \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH_NAME" \
            --state open \
            --json url \
            --jq '.[0].url // ""')

          if [ -n "$EXISTING_PR_URL" ]; then
            echo "Next SNAPSHOT PR already exists: $EXISTING_PR_URL"
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "Remote branch $BRANCH_NAME already exists. Opening a PR for it."
            gh pr create \
              --repo "${{ github.repository }}" \
              --base "${{ github.ref_name }}" \
              --head "$BRANCH_NAME" \
              --title "chore(version): start $NEXT_SNAPSHOT" \
              --body "Start the next development cycle after publishing $RELEASE_VERSION by bumping release configuration to $NEXT_SNAPSHOT."
            exit 0
          fi

          BUMPED_SNAPSHOT=$( bash .github/scripts/bump-version.sh next-snapshot | tail -n1 | cut -d= -f2 )
          if [ "$BUMPED_SNAPSHOT" != "$NEXT_SNAPSHOT" ]; then
            echo "Expected next SNAPSHOT $NEXT_SNAPSHOT, but bump-version.sh produced $BUMPED_SNAPSHOT" >&2
            exit 1
          fi

          git switch -c "$BRANCH_NAME"
          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit; skipping next SNAPSHOT PR."
            exit 0
          fi
          git commit -m "chore(version): start $NEXT_SNAPSHOT"
          git push --set-upstream origin "$BRANCH_NAME"
          gh pr create \
            --repo "${{ github.repository }}" \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH_NAME" \
            --title "chore(version): start $NEXT_SNAPSHOT" \
            --body "Start the next development cycle after publishing $RELEASE_VERSION by bumping release configuration to $NEXT_SNAPSHOT."

      - name: Snapshot 📸 - publish to Central Snapshots
        if: steps.detect.outputs.mode == 'snapshot'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          bash ./gradlew --no-daemon clean publishAllToCentralSnapshots -x test

  verify-idea-plugin:
    name: Verify IDEA plugin compatibility
    needs: publish
    if: always()
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 10
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Set up JDK 25 ☕️
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Detect version and mode 🔎
        id: detect
        run: |
          cur=$(grep -E 'project\.version\s*=\s*"[^"]+"' build-logic/src/main/kotlin/publishing.gradle.kts | head -n1 | sed -E 's/.*project\.version\s*=\s*"([^"]+)".*/\1/')
          if echo "$cur" | grep -q -- "-SNAPSHOT$"; then
            echo "mode=snapshot" >> "$GITHUB_OUTPUT"
          else
            echo "mode=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify IDEA plugin compatibility 🔎
        if: steps.detect.outputs.mode == 'release'
        run: |
          bash ./gradlew --no-daemon :kronos-idea-plugin:verifyPlugin \
            -Pkronos.idea.version="2026.2" \
            -Pkronos.idea.java.compiler.version="262.8665.258" \
            -x test
