name: Publish Kronos

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    name: Publish 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21 ☕️
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'adopt'

      - name: Detect version and mode 🔎
        id: detect
        run: |
          cur=$(grep -E 'project\.version\s*=\s*"[^"]+"' build-logic/src/main/kotlin/publishing.gradle.kts | head -n1 | sed -E 's/.*project\.version\s*=\s*"([^"]+)".*/\1/')
          echo "Current version: $cur"
          echo "current=$cur" >> "$GITHUB_OUTPUT"
          if echo "$cur" | grep -q -- "-SNAPSHOT$"; then
            echo "mode=snapshot" >> "$GITHUB_OUTPUT"
          else
            echo "mode=release" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git user 👤
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release ✨ - confirm version and commit
        if: steps.detect.outputs.mode == 'release'
        id: release_set
        run: |
          # Ensure version is a clean release (no -SNAPSHOT); if somehow a -SNAPSHOT is present, drop it.
          NEW_VERSION=$( bash .github/scripts/bump-version.sh release-from-current | tail -n1 | cut -d= -f2 )
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          # Commit only if files changed
          git add -A
          git diff --cached --quiet || git commit -m "chore(version): release $NEW_VERSION [skip ci]"

      - name: Release 🏷️ - tag and push version commit
        if: steps.detect.outputs.mode == 'release'
        run: |
          git push origin HEAD:${{ github.ref_name }}
          ver=${{ steps.release_set.outputs.version }}
          if [ -z "$ver" ]; then ver=${{ steps.detect.outputs.current }}; fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"

      - name: Release 🧱 - build JVM jars
        if: steps.detect.outputs.mode == 'release'
        run: |
          set -euo pipefail
          bash ./gradlew --no-daemon clean assemble \
            -x :kronos-idea-plugin:assemble \
            -x :kronos-idea-plugin:buildPlugin \
            -x :kronos-idea-plugin:instrumentCode \
            -x test
          bash ./gradlew --no-daemon -p kronos-gradle-plugin clean assemble -x test

      - name: Release 🧩 - build IDEA plugin artifact
        if: steps.detect.outputs.mode == 'release'
        continue-on-error: true
        run: |
          set -euo pipefail
          bash ./gradlew --no-daemon :kronos-idea-plugin:buildPlugin \
            -Pkronos.idea.version="2026.2" \
            -Pkronos.idea.java.compiler.version="261.26222.72" \
            -x test

      - name: Release 🚀 - publish to Maven Central
        if: steps.detect.outputs.mode == 'release'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
        run: |
          bash ./gradlew --no-daemon publishAllToMavenCentral -x test

      - name: Release 📦 - collect GitHub release artifacts
        if: steps.detect.outputs.mode == 'release'
        run: |
          set -euo pipefail
          mkdir -p dist/release
          find . -path '*/build/libs/*.jar' -type f \
            ! -path './kronos-docs/*' \
            ! -path './dist/*' \
            -exec cp '{}' dist/release/ ';'
          shopt -s nullglob
          idea_plugin_zips=(kronos-idea-plugin/build/distributions/*.zip)
          if [ ${#idea_plugin_zips[@]} -gt 0 ]; then
            cp "${idea_plugin_zips[@]}" dist/release/
          else
            echo "IDEA plugin zip was not built; continuing release without it."
          fi
          (
            cd dist/release
            sha256sum * > SHA256SUMS.txt
            ls -1 > ARTIFACTS.txt
          )

      - name: Release 📝 - create GitHub release
        if: steps.detect.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release_set.outputs.version }}
        run: |
          set -euo pipefail
          git tag -f "v$RELEASE_VERSION"
          git push --force origin "v$RELEASE_VERSION"
          if gh release view "v$RELEASE_VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "v$RELEASE_VERSION" dist/release/* \
              --repo "${{ github.repository }}" \
              --clobber
          else
            gh release create "v$RELEASE_VERSION" dist/release/* \
              --repo "${{ github.repository }}" \
              --title "Kronos $RELEASE_VERSION" \
              --generate-notes \
              --latest=true
          fi

      - name: Release 🔼 - open next SNAPSHOT PR
        if: steps.detect.outputs.mode == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT_SNAPSHOT=$( bash .github/scripts/bump-version.sh next-snapshot | tail -n1 | cut -d= -f2 )
          BRANCH_NAME="chore/next-snapshot-${NEXT_SNAPSHOT%-SNAPSHOT}"
          git switch -c "$BRANCH_NAME"
          git add -A
          git commit -m "chore(version): start $NEXT_SNAPSHOT [skip ci]" || echo "No changes to commit"
          git push origin "$BRANCH_NAME"
          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH_NAME" \
            --title "chore(version): start $NEXT_SNAPSHOT" \
            --body "Start the next development cycle after publishing ${{ steps.release_set.outputs.version }} by bumping release configuration to $NEXT_SNAPSHOT."

      - name: Snapshot 📸 - publish to Central Snapshots
        if: steps.detect.outputs.mode == 'snapshot'
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          bash ./gradlew --no-daemon clean publishAllToCentralSnapshots -x test
