services:
  mysql:
    image: mysql:8.0
    container_name: kronos-testing-mysql
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_USER: "${MYSQL_USERNAME:-kronos}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-kronos}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-kronos_testing}"
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "${MYSQL_USERNAME:-kronos}", "-p${MYSQL_PASSWORD:-kronos}"]
      interval: 5s
      timeout: 5s
      retries: 30

  postgres:
    image: postgres:17
    container_name: kronos-testing-postgres
    environment:
      POSTGRES_USER: "${POSTGRES_USERNAME:-kronos}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: "${POSTGRES_DATABASE:-kronos_testing}"
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-kronos} -d ${POSTGRES_DATABASE:-kronos_testing}"]
      interval: 5s
      timeout: 5s
      retries: 30

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kronos-testing-sqlserver
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U ${SQLSERVER_USERNAME:-SA} -P '${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}' -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U ${SQLSERVER_USERNAME:-SA} -P '${SQLSERVER_PASSWORD:-YourStrong!Passw0rd}' -Q 'SELECT 1'",
        ]
      interval: 10s
      timeout: 10s
      retries: 30

  oracle:
    image: "${ORACLE_DOCKER_IMAGE:-ghcr.io/gvenzl/oracle-free:23.9-slim}"
    container_name: kronos-testing-oracle
    environment:
      ORACLE_PASSWORD: "${ORACLE_SYS_PASSWORD:-YourStrong!Passw0rd}"
      APP_USER: "${ORACLE_USERNAME:-kronos}"
      APP_USER_PASSWORD: "${ORACLE_PASSWORD:-KronosPassw0rd1}"
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 10s
      retries: 60

  dm8:
    image: toyangdon/dm:8-arm64
    container_name: kronos-testing-dm8
    platform: linux/arm64
    environment:
      SYSDBA_PWD: SYSDBA
    ports:
      - "${DM_DOCKER_PORT:-5237}:5236"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'SELECT 1 FROM DUAL;' | timeout 10s /home/dmdba/dmdbms/tool/disql SYSDBA/SYSDBA@127.0.0.1:5236 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 15s
      retries: 60
